# Dependabot — automated dependency update PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# NOTE: Dependabot does NOT read image tags from Kubernetes manifests or the Helm
# chart version pinned in argocd/apps/traefik.yaml. It covers GitHub Actions here.
# The Traefik chart (ArgoCD Application + install.sh) and the oauth2-proxy image
# are handled by Renovate (see renovate.json). Renovate's github-actions manager
# is disabled there so the two tools don't open duplicate PRs.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
