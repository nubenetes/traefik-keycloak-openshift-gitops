# =============================================================================
# ArgoCD AppProject — isolates and scopes this deployment (better than project: default).
#
# Restricts WHICH repos, WHICH destination and WHICH cluster-scoped resources the
# 'traefik' and 'traefik-dashboard' Applications may create. Namespaced resources
# stay allowed by default (the value is in scoping cluster-scoped + repos + dest).
#
# Must exist BEFORE the Applications that reference it. Apply it during bootstrap,
# next to the root-app (see argocd/README.md).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: traefik
  namespace: argocd            # <<< namespace where ArgoCD runs (OpenShift GitOps: openshift-gitops)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Traefik + Keycloak-protected dashboard (OpenShift/MetalLB)

  # Only these origins: this git repo + the official Traefik chart repo.
  sourceRepos:
    - https://github.com/nubenetes/traefik-keycloak-openshift-gitops.git
    - https://traefik.github.io/charts

  # Only the 'traefik' namespace in this cluster.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: traefik

  # Allowed CLUSTER-scoped resources (what the Traefik chart installs plus the
  # managed namespace). Any other cluster-scoped resource is DENIED.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: networking.k8s.io
      kind: IngressClass

  # (Optional) sync windows, orphaned resources, etc. would go here.
