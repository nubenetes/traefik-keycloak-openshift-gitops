# =============================================================================
# GitOps secret variant: Sealed Secrets (Bitnami).
# A SealedSecret CAN live in git: it is encrypted with the cluster's
# sealed-secrets controller public key; only THAT controller decrypts it into
# the 'oauth2-proxy-secret' Secret inside the namespace.
#
# ── How to generate the real file (replace this example) ─────────────────────
#   1) Requirements: sealed-secrets controller installed + `kubeseal` CLI.
#   2) Create the plaintext Secret LOCALLY only (do not apply, do not commit):
#        cp secrets/oauth2-proxy-secret.example.yaml /tmp/secret.yaml
#        # edit /tmp/secret.yaml with the real values
#   3) Seal it (scope namespace 'traefik', name 'oauth2-proxy-secret'):
#        kubeseal --scope strict --format yaml \
#          --controller-namespace sealed-secrets \
#          < /tmp/secret.yaml \
#          > manifests/oauth2-proxy-sealedsecret.yaml
#        rm /tmp/secret.yaml
#   4) Uncomment 'oauth2-proxy-sealedsecret.yaml' in manifests/kustomization.yaml
#      and drop the out-of-band secret step. ArgoCD will apply it and the
#      controller will materialize the real Secret.
#
# The encryptedData block below is an INVALID PLACEHOLDER (does not decrypt):
# it is here only to document the shape. Generate yours with kubeseal.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth2-proxy-secret
  namespace: traefik
spec:
  encryptedData:
    OAUTH2_PROXY_CLIENT_ID: AgB_REPLACE_WITH_KUBESEAL_OUTPUT...
    OAUTH2_PROXY_CLIENT_SECRET: AgB_REPLACE_WITH_KUBESEAL_OUTPUT...
    OAUTH2_PROXY_COOKIE_SECRET: AgB_REPLACE_WITH_KUBESEAL_OUTPUT...
  template:
    metadata:
      name: oauth2-proxy-secret
      namespace: traefik
    type: Opaque
