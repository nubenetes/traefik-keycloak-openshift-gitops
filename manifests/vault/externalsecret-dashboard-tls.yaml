# =============================================================================
# OPTIONAL — pull the dashboard TLS cert/key from Vault into the
# 'traefik-dashboard-tls' Secret (type kubernetes.io/tls).
#
# Prefer cert-manager (docs/tls-secret.md) if you have it; use this only if you
# already store the cert material in Vault.
#
# Expected Vault KV v2 secret at  secret/traefik/dashboard-tls  with keys:
#   tls.crt, tls.key   (PEM). Example:
#     vault kv put secret/traefik/dashboard-tls tls.crt=@tls.crt tls.key=@tls.key
# =============================================================================
apiVersion: external-secrets.io/v1        # ESO >= 0.14; older operators use v1beta1
kind: ExternalSecret
metadata:
  name: traefik-dashboard-tls
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: traefik-dashboard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tls_crt }}"
        tls.key: "{{ .tls_key }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: traefik/dashboard-tls
        property: tls.crt
    - secretKey: tls_key
      remoteRef:
        key: traefik/dashboard-tls
        property: tls.key
