# =============================================================================
# ExternalSecret — pulls the oauth2-proxy credentials from Vault and materializes
# the 'oauth2-proxy-secret' Secret that the Deployment consumes. NO secret
# material lives here (only Vault references), so it is safe to commit.
#
# Expected Vault KV v2 secret at  secret/traefik/oauth2-proxy  with keys:
#   client_id, client_secret, cookie_secret
# Create it with (see docs/vault-external-secrets.md):
#   vault kv put secret/traefik/oauth2-proxy \
#     client_id=traefik-dashboard \
#     client_secret=<keycloak-client-secret> \
#     cookie_secret=$(openssl rand -base64 32 | tr -- '+/' '-_')
# =============================================================================
apiVersion: external-secrets.io/v1        # ESO >= 0.14; older operators use v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secret
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: oauth2-proxy-secret          # the Secret name the Deployment references
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: traefik/oauth2-proxy
        property: client_id
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: traefik/oauth2-proxy
        property: client_secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: traefik/oauth2-proxy
        property: cookie_secret
