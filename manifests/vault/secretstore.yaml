# =============================================================================
# External Secrets Operator — SecretStore pointing at HashiCorp Vault (KV v2),
# authenticating with the OpenShift ServiceAccount token (Kubernetes auth).
#
# This CONTAINS NO SECRET MATERIAL (only the Vault address, mount and role), so
# it is safe to commit. Adjust the <<< values to your environment.
#
# Requires: External Secrets Operator installed (OperatorHub) and Vault reachable.
# Setup of the Vault side (KV mount, kubernetes auth, policy, role) is in
# docs/vault-external-secrets.md.
# =============================================================================
apiVersion: external-secrets.io/v1        # ESO >= 0.14; older operators use v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: traefik
spec:
  provider:
    vault:
      # <<< CHANGE the server:
      #   Internal Vault in OCP:  https://vault.vault.svc.cluster.local:8200
      #                           (or the Route: https://vault.apps.example.com)
      #   External Vault:         https://vault.example.com:8200
      server: "https://vault.example.com:8200"
      path: "secret"          # KV v2 mount point in Vault
      version: v2
      # If Vault uses a self-signed / internal CA, let ESO trust it. On OpenShift
      # you can reference the injected trusted-CA bundle instead of inlining it:
      # caProvider:
      #   type: ConfigMap
      #   name: oauth2-proxy-trusted-ca      # the ConfigMap in manifests/oauth2-proxy/
      #   namespace: traefik
      #   key: ca-bundle.crt
      auth:
        kubernetes:
          # Vault kubernetes auth mount path (default "kubernetes").
          mountPath: "kubernetes"
          # Vault role bound to the SA below + this namespace (see the doc).
          role: "traefik-dashboard"
          serviceAccountRef:
            name: external-secrets-vault
