# =============================================================================
# Kustomize base of the "raw" manifests of the protected dashboard.
# Consumed by the ArgoCD Application  argocd/apps/traefik-dashboard.yaml
# (and also usable for a manual deploy: `oc apply -k manifests/`).
#
# NOTE: the Namespace is NOT here (the Traefik Application creates it via
# managedNamespaceMetadata, with the PSA label) and neither are the Secrets
# (oauth2-proxy-secret and traefik-dashboard-tls are managed outside git;
# see README and argocd/README.md).
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

resources:
  - oauth2-proxy/deployment.yaml
  - oauth2-proxy/service.yaml
  - dashboard/middlewares.yaml
  - dashboard/ingressroute-oauth2.yaml
  - dashboard/ingressroute-dashboard.yaml
  # Optional (OpenShift): trusted CA for the Keycloak cert.
  # Also uncomment the volumes in oauth2-proxy/deployment.yaml.
  # - oauth2-proxy/trusted-ca-configmap.yaml
  #
  # Optional (secret IN git via Sealed Secrets): generate the real file with
  # kubeseal (see oauth2-proxy-sealedsecret.example.yaml) and uncomment it. Then
  # ArgoCD manages the secret and the out-of-band `oc apply` is not needed.
  # - oauth2-proxy-sealedsecret.yaml
