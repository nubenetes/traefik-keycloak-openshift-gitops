# =============================================================================
# Two middlewares that together provide the full authentication flow:
#
#  oauth-auth   -> ForwardAuth: on every request it asks oauth2-proxy
#                  (/oauth2/auth). Returns 202 (authenticated) or 401.
#  oauth-errors -> catches that 401 and rewrites it to a 302 towards
#                  /oauth2/sign_in, which redirects to the Keycloak login.
#                  Without statusRewrites the browser would see a blank 401.
#
# Requires Traefik >= v3.4 (statusRewrites in the errors middleware).
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-auth
  namespace: traefik
spec:
  forwardAuth:
    address: http://oauth2-proxy.traefik.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
      - Set-Cookie
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-errors
  namespace: traefik
spec:
  errors:
    status:
      - "401-403"
    service:
      name: oauth2-proxy
      port: 4180
    query: "/oauth2/sign_in?rd={url}"
    statusRewrites:
      "401": 302
