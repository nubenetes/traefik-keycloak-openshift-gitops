# =============================================================================
# Traefik dashboard (api@internal) protected by Keycloak.
# Middleware order matters: first oauth-errors (wraps the response to rewrite
# the 401->302), then oauth-auth (performs the check).
# Dummy host traefik.apps.example.com. Replace it with the real one.
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.apps.example.com`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
      middlewares:
        - name: oauth-errors
        - name: oauth-auth
  tls:
    secretName: traefik-dashboard-tls
