# =============================================================================
# oauth2-proxy Secret — managed OUTSIDE git (out-of-band), NOT by ArgoCD.
#
# Copy this template, fill in the values and apply it once to the cluster:
#   cp secrets/oauth2-proxy-secret.example.yaml secrets/oauth2-proxy-secret.yaml
#   # edit secrets/oauth2-proxy-secret.yaml
#   oc apply -f secrets/oauth2-proxy-secret.yaml
#
# The real file (secrets/oauth2-proxy-secret.yaml) is in .gitignore.
#
# COOKIE_SECRET must be 16, 24 or 32 bytes. Generate it like this:
#   openssl rand -base64 32 | tr -- '+/' '-_'
#
# CLIENT_SECRET is copied from the 'traefik-dashboard' client in Keycloak
# (Clients -> traefik-dashboard -> Credentials).
#
# ── Full GitOps path (recommended if you want the secret IN git) ─────────────
# Replace this manual flow with Sealed Secrets or the External Secrets Operator
# and add the resulting resource to manifests/kustomization.yaml. See README §GitOps.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: traefik
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: "traefik-dashboard"
  # Valid dummies to boot; replace with the real ones before use.
  OAUTH2_PROXY_CLIENT_SECRET: "dummy-client-secret-REPLACE"
  OAUTH2_PROXY_COOKIE_SECRET: "wFUZUmfNYKe1NONvSqbyg0YNsjx0k7Tb2tHjpVmQl5o="
